<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-Noida Skins — Upgraded</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
        :root {
            --primary: #7b5bff;
            --accent: #ff4ecd;
            --bg: #0d0d16;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: var(--bg);
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated Background */
        .blob {
            width: 55vw;
            height: 55vw;
            background: var(--primary);
            position: fixed;
            filter: blur(160px);
            opacity: 0.35;
            animation: float 12s ease-in-out infinite alternate;
            z-index: -1;
            top: -10%;
            left: -10%;
        }
        .blob2 {
            width: 45vw;
            height: 45vw;
            background: var(--accent);
            position: fixed;
            filter: blur(180px);
            opacity: 0.25;
            animation: float2 14s ease-in-out infinite alternate;
            z-index: -1;
            bottom: -15%;
            right: -10%;
        }

        @keyframes float {
            from { transform: translate(0,0); }
            to { transform: translate(80px, 60px); }
        }
        @keyframes float2 {
            from { transform: translate(0,0); }
            to { transform: translate(-60px, -80px); }
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        nav .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(123,91,255,0.5);
        }

        /* Cart Icon */
        .cart-btn {
            padding: 10px 25px;
            background: var(--primary);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cart-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Hero */
        header {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        header h1 {
            font-size: 4.5rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            color: transparent;
        }
        header p {
            font-size: 1.3rem;
            color: #bbb;
            margin-top: 10px;
        }

        .btn {
            margin-top: 25px;
            padding: 15px 45px;
            background: var(--primary);
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.12);
            box-shadow: 0 0 20px var(--primary);
        }

        /* Container */
        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 35px;
        }

        /* Product Card */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            transition: transform 0.35s;
            overflow: hidden;
            position: relative;
        }
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255,255,255,0.12);
        }

        .card img {
            width: 100%;
            height: 210px;
            border-radius: 18px;
            object-fit: cover;
        }

        .price {
            font-size: 1.7rem;
            font-weight: bold;
            margin: 10px 0;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(123,91,255,0.4);
        }

        /* Contact Form */
        #contact {
            background: var(--glass);
            padding: 50px;
            border-radius: 25px;
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        textarea {
            min-height: 120px;
        }

        /* Cart Sidebar */
        #cartSidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100vh;
            background: rgba(20,20,35,0.8);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-left: 1px solid var(--border);
            transition: 0.35s;
            z-index: 200;
        }
        #cartSidebar.open {
            right: 0;
        }
        #cartSidebar h3 {
            margin-top: 0;
        }
        .close-btn {
            cursor: pointer;
            color: #ff8080;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="blob2"></div>

    <nav>
        <div class="logo">G-NOIDA SKINS</div>
        <div class="cart-btn" onclick="toggleCart()">Cart <span class="cart-count">0</span></div>
    </nav>

    <header data-aos="fade-up">
        <h1>Level Up Your Setup</h1>
        <p>Premium Skins Delivered Anywhere in G-Noida.</p>
        <a href="#shop" class="btn">Shop Now</a>
    </header>

    <div class="container" id="shop">
        <h2 data-aos="fade-right">🔥 Trending Skins</h2>
        <div class="grid">
            <div class="card" data-aos="zoom-in">
                <img src="https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=500" />
                <h3>Cyberpunk Skin</h3>
                <p class="price">₹299</p>
                <button class="btn" onclick="addToCart('Cyberpunk Skin - ₹299')">Add to Cart</button>
            </div>
            <div class="card" data-aos="zoom-in" data-aos-delay="100">
                <img src="https://images.unsplash.com/photo-1572375992501-4b0892d50c69?w=500" />
                <h3>Anime Sticker Pack (x50)</h3>
                <p class="price">₹199</p>
                <button class="btn" onclick="addToCart('Anime Sticker Pack - ₹199')">Add to Cart</button>
            </div>
            <div class="card" data-aos="zoom-in" data-aos-delay="200">
                <img src="https://images.unsplash.com/photo-1531297461136-82lw9b44d940?w=500" />
                <h3>Neon Keycaps Sticker</h3>
                <p class="price">₹149</p>
                <button class="btn" onclick="addToCart('Neon Keycaps - ₹149')">Add to Cart</button>
            </div>
        </div>
    </div>

    <div class="container" id="contact">
        <h2 style="text-align:center;">Checkout</h2>
        <p style="text-align:center;">You will be contacted via WhatsApp for UPI Payment.</p>

        <form id="orderForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <label>Name</label>
            <input type="text" name="name" required />

            <label>WhatsApp Number</label>
            <input type="text" name="phone" required />

            <label>Hostel / Address (G-Noida)</label>
            <input type="text" name="address" required />

            <label>Your Order</label>
            <textarea id="orderItems" name="order_items" readonly></textarea>

            <button type="submit" class="btn" style="width:100%">Place Order</button>
        </form>
    </div>

    <!-- CART SIDEBAR -->
    <div id="cartSidebar">
        <h3>Your Cart</h3>
        <div class="close-btn" onclick="toggleCart()">Close ✕</div>
        <pre id="cartDisplay" style="white-space: pre-wrap; margin-top:20px;"></pre>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        let cart = [];

        const cartOutput = document.getElementById("orderItems");
        const countBadge = document.querySelector(".cart-count");
        const cartDisplay = document.getElementById("cartDisplay");
        const cartSidebar = document.getElementById("cartSidebar");

        function addToCart(item) {
            cart.push(item);
            cartOutput.value = cart.join("\n");
            cartDisplay.innerText = cart.join("\n");
            countBadge.innerText = cart.length;
        }

        function toggleCart() {
            cartSidebar.classList.toggle("open");
        }
    </script>
</body>
</html>
